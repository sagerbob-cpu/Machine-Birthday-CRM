
steps:
  # Step 1: Install all the necessary packages for your React app
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['install']

  # Step 2: Build the production-ready version of your app
  - name: 'node:20'
    entrypoint: 'npm'
    args: ['run', 'build']

  # Step 3: Deploy only the hosting files to Firebase
  - name: 'node:20'
    entrypoint: 'npx'
    args: ['firebase-tools', 'deploy', '--only', 'hosting', '--project', '$PROJECT_ID']

options:
  logging: CLOUD_LOGGING_ONLY